name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: |
          cd /__w/gestor360-final/gestor360-final
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gestor360-APK
          path: bin/*.apk
